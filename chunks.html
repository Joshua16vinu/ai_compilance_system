<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Policy Chunk Builder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'IBM Plex Mono', monospace;
    padding: 32px 24px;
  }
  .header { margin-bottom: 32px; }
  .header .label { font-size: 11px; letter-spacing: 4px; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: #475569; font-size: 13px; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .panel {
    background: #161b27;
    border: 1px solid #1e2a3a;
    border-radius: 12px;
    padding: 24px;
  }
  .panel-title { font-size: 11px; color: #64748b; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; }
  select, textarea {
    width: 100%;
    background: #0f1117;
    border: 1px solid #1e2a3a;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 14px;
  }
  textarea { resize: vertical; line-height: 1.6; outline: none; }
  .token-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .token-badge {
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  #add-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 14px;
    transition: all 0.2s;
  }
  #add-btn:disabled { background: #1e2a3a; color: #475569; cursor: not-allowed; }
  #add-btn.flash { background: #22c55e; }
  .right-panel { display: flex; flex-direction: column; }
  .right-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .btn-group { display: flex; gap: 8px; }
  .btn-small {
    background: #1e2a3a;
    border: 1px solid #2d3a4a;
    color: #94a3b8;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
  }
  .btn-small.download { color: #38bdf8; }
  .btn-small.copied { background: #22c55e22; border-color: #22c55e; color: #22c55e; }
  .chunks-list { max-height: 460px; overflow-y: auto; }
  .empty-state { text-align: center; color: #334155; font-size: 13px; margin-top: 60px; line-height: 2; }
  .chunk-card {
    background: #0f1117;
    border: 1px solid #1e2a3a;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .chunk-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .chunk-meta .subdomain-label { font-size: 10px; color: #64748b; letter-spacing: 2px; }
  .chunk-meta .uuid { font-size: 10px; color: #334155; margin-top: 2px; font-family: monospace; }
  .remove-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 4px; }
  .chunk-text {
    margin-top: 8px; font-size: 12px; color: #94a3b8;
    line-height: 1.6; max-height: 72px; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent);
  }
  .chunk-badge { margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="label">CISecurity · Manual Chunk Builder</div>
  <h1>Policy Chunk Builder</h1>
  <p>Paste text → pick domain → Add Chunk → Download JSON</p>
</div>

<div class="grid">
  <!-- LEFT -->
  <div class="panel">
    <div class="panel-title">New Chunk</div>

    <label>Domain</label>
    <select id="domain-select"></select>

    <label>Subdomain</label>
    <select id="subdomain-select"></select>

    <div class="token-row">
      <label style="margin-bottom:0">Text (paste from doc)</label>
      <span id="token-badge" class="token-badge" style="display:none"></span>
    </div>
    <textarea id="chunk-text" rows="10" placeholder="Paste your selected policy text here..."></textarea>

    <button id="add-btn" disabled>+ Add Chunk</button>
  </div>

  <!-- RIGHT -->
  <div class="panel right-panel">
    <div class="right-header">
      <div class="panel-title" style="margin-bottom:0">Chunks (<span id="chunk-count">0</span>)</div>
      <div class="btn-group" id="btn-group" style="display:none">
        <button class="btn-small" id="copy-btn">Copy JSON</button>
        <button class="btn-small download" id="download-btn">↓ Download</button>
      </div>
    </div>
    <div class="chunks-list" id="chunks-list">
      <div class="empty-state">No chunks yet.<br/>Paste text on the left and click Add Chunk.</div>
    </div>
  </div>
</div>

<script>
const DOMAIN_MAP = {
  "Data Privacy & Security": [
    "Access-Control-Policy","Account-Management-Access-Control-Standard",
    "Authentication-Tokens-Standard","Encryption-Standard",
    "Identification-and-Authentication-Policy","Information-Classification-Standard",
    "Media-Protection-Policy","Mobile-Device-Security","Remote-Access-Standard",
    "Sanitization-Secure-Disposal-Standard","System-and-Communications-Protection-Policy"
  ],
  "ISMS": [
    "Acceptable-Use-of-Information-Technology-Resources-Policy",
    "Auditing-and-Accountability-Policy","Configuration-Management-Policy",
    "Contingency-Planning-Policy","Information-Security-Policy","Maintenance-Policy",
    "Personnel-Security-Policy","Physical-and-Environmental-Protection-Policy",
    "Planning-Policy","Secure-System-Development-Life-Cycle-Standard",
    "Security-Awareness-and-Training-Policy","System-and-Services-Acquisition-Policy"
  ],
  "Patch Management": [
    "Patch-Management-Standard","Secure-Configuration-Standard",
    "Security-Logging-Standard","System-and-Information-Integrity-Policy",
    "Vulnerability-Scanning-Standard"
  ],
  "Risk Management": [
    "Computer-Security-Threat-Response-Policy","Cyber-Incident-Response-Standard",
    "Incident-Response-Policy","Information-Security-Risk-Management-Standard",
    "Risk-Assessment-Policy","Security-Assessment-and-Authorization-Policy"
  ]
};

let chunks = [];

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function countTokens(text) {
  return Math.round(text.trim().split(/\s+/).filter(Boolean).length / 0.75);
}

function getTokenStyle(count) {
  if (count < 100) return { color: '#ef4444', label: 'Too short' };
  if (count <= 400) return { color: '#22c55e', label: 'Sweet spot ✓' };
  if (count <= 600) return { color: '#f59e0b', label: 'Acceptable' };
  return { color: '#ef4444', label: 'Too long' };
}

// Populate domain dropdown
const domainSelect = document.getElementById('domain-select');
Object.keys(DOMAIN_MAP).forEach(d => {
  const opt = document.createElement('option');
  opt.value = d; opt.textContent = d;
  domainSelect.appendChild(opt);
});

function populateSubdomains(domain) {
  const subSelect = document.getElementById('subdomain-select');
  subSelect.innerHTML = '';
  DOMAIN_MAP[domain].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    subSelect.appendChild(opt);
  });
}
populateSubdomains(domainSelect.value);

domainSelect.addEventListener('change', () => populateSubdomains(domainSelect.value));

// Token badge update
const textarea = document.getElementById('chunk-text');
const addBtn = document.getElementById('add-btn');
const tokenBadge = document.getElementById('token-badge');

textarea.addEventListener('input', () => {
  const val = textarea.value.trim();
  addBtn.disabled = !val;
  if (val) {
    const count = countTokens(val);
    const { color, label } = getTokenStyle(count);
    tokenBadge.style.display = 'inline';
    tokenBadge.textContent = `${count} tokens · ${label}`;
    tokenBadge.style.color = color;
    tokenBadge.style.background = color + '22';
    tokenBadge.style.border = `1px solid ${color}55`;
  } else {
    tokenBadge.style.display = 'none';
  }
});

// Add chunk
addBtn.addEventListener('click', () => {
  const text = textarea.value.trim();
  if (!text) return;
  const chunk = {
    id: generateUUID(),
    text,
    domain: domainSelect.value,
    subdomain: document.getElementById('subdomain-select').value,
    source: "CISecurity"
  };
  chunks.push(chunk);
  textarea.value = '';
  tokenBadge.style.display = 'none';
  addBtn.disabled = true;
  addBtn.textContent = '✓ Added!';
  addBtn.classList.add('flash');
  setTimeout(() => { addBtn.textContent = '+ Add Chunk'; addBtn.classList.remove('flash'); }, 800);
  renderChunks();
});

function renderChunks() {
  document.getElementById('chunk-count').textContent = chunks.length;
  const list = document.getElementById('chunks-list');
  const btnGroup = document.getElementById('btn-group');
  btnGroup.style.display = chunks.length > 0 ? 'flex' : 'none';

  if (chunks.length === 0) {
    list.innerHTML = '<div class="empty-state">No chunks yet.<br/>Paste text on the left and click Add Chunk.</div>';
    return;
  }

  list.innerHTML = chunks.map((c, i) => {
    const count = countTokens(c.text);
    const { color, label } = getTokenStyle(count);
    return `
      <div class="chunk-card">
        <div class="chunk-header">
          <div class="chunk-meta">
            <div class="subdomain-label">#${i+1} · ${c.subdomain}</div>
            <div class="uuid">${c.id}</div>
          </div>
          <button class="remove-btn" onclick="removeChunk('${c.id}')">✕</button>
        </div>
        <div class="chunk-text">${c.text.replace(/</g,'&lt;')}</div>
        <div class="chunk-badge">
          <span class="token-badge" style="color:${color};background:${color}22;border:1px solid ${color}55">
            ${count} tokens · ${label}
          </span>
        </div>
      </div>`;
  }).join('');
}

function removeChunk(id) {
  chunks = chunks.filter(c => c.id !== id);
  renderChunks();
}

// Copy JSON
document.getElementById('copy-btn').addEventListener('click', function() {
  navigator.clipboard.writeText(JSON.stringify(chunks, null, 2));
  this.textContent = '✓ Copied!';
  this.classList.add('copied');
  setTimeout(() => { this.textContent = 'Copy JSON'; this.classList.remove('copied'); }, 2000);
});

// Download JSON
document.getElementById('download-btn').addEventListener('click', () => {
  const subdomain = document.getElementById('subdomain-select').value;
  const blob = new Blob([JSON.stringify(chunks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `chunks_${subdomain}.json`;
  a.click();
});
</script>
</body>
</html>
